<!DOCTYPE html>
<html>
<head>
    <title>CircuLib Dashboard</title>
    <link rel="stylesheet" href="st_page.css">
</head>
<body>

    <div class="header">
        <img src="final_logo3.jpg" class="main-logo">
        
        <span class="dash-text">Dashboard</span>
        <input type="text" class="search-box" placeholder="Search books...">

        <div class="right-menu">
            <span class="avatar">ST</span>
            <div class="user-info">
                <b>Student</b><br>
                <small>View Profile</small>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="content-row">
            <div class="left-side">
                <h3>My Active Borrows</h3>

                <div id="books-container">

                    <div class="book">
                        <img src="THEHOBBIT.webp">
                        <div class="details">
                            <b class="book-title">The Hobbit</b>
                            <p class="due-text red-text">Due: 2 Days</p>
                            <p class="fine">Fine: ₹10/day</p>
                        </div>
                    </div>

                    <div class="book">
                        <img src="1984.webp">
                        <div class="details">
                            <b class="book-title">1984</b>
                            <p class="due-text red-text">Due: 5 Days</p>
                            <p class="fine">Fine: ₹10/day</p>
                        </div>
                    </div>

                    <div class="book">
                        <img src="THEBRIEFHISTORY.webp">
                        <div class="details">
                            <b class="book-title">A Brief History</b>
                            <p class="due-text green-text">Due: 8 Days</p>
                            <p class="fine">Fine: ₹10/day</p>
                        </div>
                    </div>

                    <div class="book">
                        <img src="THEALCHEMIST.webp">
                        <div class="details">
                            <b class="book-title">The Alchemist</b>
                            <p class="due-text green-text">Due: 12 Days</p>
                            <p class="fine">Fine: ₹10/day</p>
                        </div>
                    </div>

                </div>
            </div>

            <div class="right-side">
                <div class="fine-box">
                    <h3>Fine Tracker</h3>
                    <p>Total Amount Due</p>
                    
                    <h1 class="price" id="total-fine">$12.50</h1>
                    <button class="pay-btn">Pay Now</button>
                    
                    <p style="margin-top:15px">
                        <a href="#" style="color:#3b82f6; text-decoration:none; font-size:12px;">View History</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
    <script src="st_page.js"></script>
</body>
</html>
